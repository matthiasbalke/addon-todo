---
name: Update Base Image

"on":
  repository_dispatch:
    types:
      - update

permissions:
  contents: write

jobs:
  update-base-image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Extract sha tag
        id: extract-tag
        env:
          TAGS: ${{ toJson(github.event.client_payload.tags) }}
        run: |
          SHA_TAG=$(echo "$TAGS" | jq -r '.[] | select(startswith("sha-"))')
          if [ -z "$SHA_TAG" ]; then
            echo "No sha-* tag found in payload"
            exit 1
          fi
          echo "sha_tag=${SHA_TAG}" >> "$GITHUB_OUTPUT"

      - name: Update Dockerfile
        env:
          SHA_TAG: ${{ steps.extract-tag.outputs.sha_tag }}
        run: |
          sed -i \
            "s|FROM ghcr.io/matthiasbalke/todo/all-in-one:sha-[a-zA-Z0-9]*|FROM ghcr.io/matthiasbalke/todo/all-in-one:${SHA_TAG}|" \
            todo/Dockerfile

      - name: Commit and push
        env:
          SHA_TAG: ${{ steps.extract-tag.outputs.sha_tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add todo/Dockerfile
          git diff --staged --quiet || git commit -m "chore: update base image to ${SHA_TAG}"
          git push
