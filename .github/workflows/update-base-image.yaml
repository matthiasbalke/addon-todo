---
name: Update Base Image

# yamllint disable-line rule:truthy
on:
  repository_dispatch:
    types:
      - update

permissions:
  contents: write

jobs:
  update-base-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          client-id: ${{ vars.MATTHIASBALKE_TODO_BOT_APP_ID }}
          private-key: ${{ secrets.MATTHIASBALKE_TODO_BOT_APP_PRIVATE_KEY }}
          permission-contents: write

      - name: Checkout
        # v6.0.2
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        # zizmor: ignore[artipacked]
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Extract image tag
        id: extract-tag
        env:
          TAGS: ${{ toJson(github.event.client_payload.tags) }}
        run: |
          IMAGE_TAG=$(echo "$TAGS" | jq -r 'first(.[] | select(test("^[0-9]+\\.[0-9]+\\.[0-9]+$"))) // first(.[] | select(startswith("sha-"))) // ""')
          if [ -z "$IMAGE_TAG" ]; then
            echo "No release or sha-* tag found in payload"
            exit 1
          fi
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Update Dockerfile
        env:
          IMAGE_TAG: ${{ steps.extract-tag.outputs.image_tag }}
        run: |
          sed -i \
            "s|FROM ghcr.io/matthiasbalke/todo/all-in-one:[-.a-zA-Z0-9]*|FROM ghcr.io/matthiasbalke/todo/all-in-one:${IMAGE_TAG}|" \
            todo/Dockerfile

      - name: Commit and push
        env:
          IMAGE_TAG: ${{ steps.extract-tag.outputs.image_tag }}
        run: |
          git config user.name "matthiasbalke-todo-bot"
          git config user.email "matthiasbalke-todo-bot@users.noreply.github.com"
          git add todo/Dockerfile
          git diff --staged --quiet || git commit -m "chore: update base image to ${IMAGE_TAG}"
          git push
