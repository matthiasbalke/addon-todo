---
name: CI

# yamllint disable-line rule:truthy
on:
  push:
    branches: [main]
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
  workflow_dispatch:
  # zizmor: ignore[dangerous-triggers]
  workflow_run:
    workflows: ["Update Base Image"]
    types:
      - completed
    branches: [main]

jobs:
  workflows:
    if:
      ${{ github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success' }}
    permissions:
      actions: read
      packages: read
      pull-requests: read
      contents: write
      security-events: write
    uses: hassio-addons/workflows/.github/workflows/app-ci.yaml@main
