---
name: PR Labels

# yamllint disable-line rule:truthy
on:
  pull_request_target:
    # zizmor: ignore[dangerous-triggers]
    types:
      - opened
      - labeled
      - unlabeled
      - synchronize

jobs:
  workflows:
    # zizmor: ignore[excessive-permissions]
    uses: hassio-addons/workflows/.github/workflows/pr-labels.yaml@main
