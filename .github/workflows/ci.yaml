---
name: CI

# yamllint disable-line rule:truthy
on:
  push:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
  workflow_dispatch:

jobs:
  workflows:
    permissions:
      actions: read
      packages: read
      pull-requests: read
      contents: write
      security-events: write
    uses: hassio-addons/workflows/.github/workflows/app-ci.yaml@main
